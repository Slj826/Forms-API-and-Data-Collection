		crossorigin="anonymous"></script>
		<script>
		function SubForm (){
			$.ajax({
				url:"https://api.apispreadsheets.com/data/bGXVd2GLiNhwtY8N/",
				type:"post",
				data:$("#myForm").serializeArray(),
				success: function(){
					alert("Form Data Submitted :)")
				},
				error: function(){
					alert("There was an error :(")
				}
			});
		}
	</script>

<section id="Join" class="section">
  
  <h2>Join Us</h2>
  
  <p class="description">To create a job listing, please complete the form below.</p>

  <form id="myForm">

    <label>Job Title</label>
    <input name="Job Title">

    <label>Requisition ID</label>
    <input name="Requisition ID">

    <label>Salary</label>
    <input name="Salary">

    <label>Job Type</label>
    <select name="Job Type">
      <option>Full-Time</option>
      <option>Part-Time</option>
    </select>

    <label>Education Requirement</label>
    <select name="Education Requirement">
      <option>High School</option>
      <option>Post-Secondary</option>
      <option>Trade / Professional School</option>
      <option>Other</option>
    </select>

    <label>Application Method</label>
    <input name="Application Method">

    <label>Street Number & Name</label>
    <input name="Street Number & Name">

    <label>City</label>
    <input name="City">

    <label>Province</label>
    <input name="Province">

    <label>Postal Code</label>
    <input name="Postal Code">

    <label>Job Description & Requirements</label>
    <textarea name="Job Description & Requirements"></textarea>

    <button type="button" onclick="SubForm()">
      Submit
    </button>

  </form>

</section>
